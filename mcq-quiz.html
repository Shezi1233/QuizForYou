<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AI Agent Factory — MCQ Quiz</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #e8eaff 0%, #f5f3ff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .quiz-container {
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 8px 40px rgba(108,99,255,0.12);
            width: 100%;
            max-width: 780px;
            padding: 28px 32px;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .quiz-title {
            font-size: 18px;
            font-weight: 700;
            color: #1a1a2e;
        }
        .quiz-title span { color: #6c63ff; }
        .top-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .timer {
            font-size: 18px;
            font-weight: 700;
            color: #1a1a2e;
            background: #f0f2f5;
            padding: 5px 14px;
            border-radius: 20px;
            font-variant-numeric: tabular-nums;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .timer svg { flex-shrink: 0; }
        .timer.warn { color: #ef4444; background: #fef2f2; }
        .badge {
            font-size: 13px;
            color: #666;
            background: #f0f2f5;
            padding: 5px 14px;
            border-radius: 20px;
            font-weight: 600;
        }
        .progress-track {
            width: 100%;
            height: 7px;
            background: #eee;
            border-radius: 10px;
            margin-bottom: 22px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #6c63ff, #a78bfa);
            border-radius: 10px;
            transition: width 0.35s ease;
            width: 0%;
        }
        .q-area { margin-bottom: 20px; }
        .q-module {
            font-size: 12px;
            font-weight: 600;
            color: #6c63ff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        .q-text {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a2e;
            line-height: 1.5;
        }
        .q-topic {
            display: inline-block;
            font-size: 11px;
            background: #eeecff;
            color: #6c63ff;
            padding: 3px 12px;
            border-radius: 20px;
            margin-top: 8px;
            font-weight: 500;
        }
        .opts {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 18px;
        }
        .opt {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 13px 18px;
            border: 2px solid #e8e8ee;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 15px;
            color: #333;
            background: #fff;
            user-select: none;
        }
        .opt:hover { border-color: #c8c4ff; background: #faf9ff; }
        .opt.correct-ans {
            border-color: #10b981;
            background: #ecfdf5;
            cursor: default;
        }
        .opt.correct-ans .opt-letter { color: #10b981; }
        .opt.correct-ans::after {
            content: "✓";
            color: #10b981;
            font-weight: 700;
            font-size: 18px;
            margin-left: auto;
            flex-shrink: 0;
        }
        .opt.wrong-ans {
            border-color: #ef4444;
            background: #fef2f2;
            cursor: default;
        }
        .opt.wrong-ans .opt-letter { color: #ef4444; }
        .opt.wrong-ans::after {
            content: "✗";
            color: #ef4444;
            font-weight: 700;
            font-size: 18px;
            margin-left: auto;
            flex-shrink: 0;
        }
        .opt.reveal-correct-only {
            border-color: #10b981;
            background: #ecfdf5;
            cursor: default;
        }
        .opt.reveal-correct-only .opt-letter { color: #10b981; }
        .opt.reveal-correct-only::after {
            content: "✓";
            color: #10b981;
            font-weight: 700;
            font-size: 18px;
            margin-left: auto;
            flex-shrink: 0;
        }
        .opt.disabled-click { pointer-events: none; }
        .opt-letter {
            font-weight: 700;
            color: #6c63ff;
            width: 22px;
            flex-shrink: 0;
            font-size: 14px;
        }
        .opt input[type="radio"] { display: none; }

        .fb {
            padding: 14px 18px;
            border-radius: 14px;
            margin-bottom: 18px;
            font-size: 16px;
            font-weight: 700;
            line-height: 1.5;
            display: none;
            text-align: center;
        }
        .fb.show { display: block; }
        .fb.ok { background: #ecfdf5; border-left: 4px solid #10b981; color: #065f46; }
        .fb.fail { background: #fef2f2; border-left: 4px solid #ef4444; color: #991b1b; }
        .nav {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
        .btn {
            padding: 11px 30px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
        }
        .btn:disabled { opacity: 0.35; cursor: not-allowed; }
        .btn-pri { background: #6c63ff; color: #fff; }
        .btn-pri:hover:not(:disabled) { background: #5a52e0; }
        .btn-green { background: #10b981; color: #fff; }
        .btn-green:hover:not(:disabled) { background: #059669; }
        .btn-amber { background: #f59e0b; color: #fff; }
        .btn-amber:hover:not(:disabled) { background: #d97706; }

        .rs { text-align: center; padding: 10px 0; }
        .rs h2 { font-size: 28px; color: #1a1a2e; margin-bottom: 4px; }
        .rs .sub { color: #777; font-size: 15px; margin-bottom: 24px; }
        .score-ring {
            width: 130px; height: 130px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6c63ff, #a78bfa);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            margin: 0 auto 24px;
            color: #fff;
        }
        .score-ring .num { font-size: 40px; font-weight: 700; line-height: 1; }
        .score-ring .lbl { font-size: 13px; opacity: 0.9; margin-top: 4px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 24px;
        }
        .card {
            background: #f8f9ff;
            border-radius: 14px;
            padding: 14px 6px;
        }
        .card .n { font-size: 22px; font-weight: 700; }
        .card .l { font-size: 12px; color: #999; margin-top: 2px; }
        .card.grn .n { color: #10b981; }
        .card.red .n { color: #ef4444; }
        .card.amb .n { color: #f59e0b; }
        .card.pur .n { color: #6c63ff; }
        .ra { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 8px; }

        .screen { display: none; }
        .screen.on { display: block; }

        @media (max-width: 600px) {
            .quiz-container { padding: 16px; }
            .q-text { font-size: 16px; }
            .opt { padding: 11px 14px; font-size: 14px; }
            .grid { grid-template-columns: repeat(2, 1fr); }
            .btn { padding: 10px 20px; font-size: 14px; }
            .score-ring { width: 110px; height: 110px; }
            .score-ring .num { font-size: 32px; }
            .top-right { gap: 6px; }
            .timer { font-size: 15px; padding: 3px 10px; }
        }
    </style>
</head>
<body>
<div class="quiz-container" id="app">

    <!-- QUIZ SCREEN -->
    <div class="screen on" id="quizScreen">
        <div class="top-bar">
            <div class="quiz-title">🤖 <span>AI Agent Factory</span></div>
            <div class="top-right">
                <div class="timer" id="timerDisplay">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    <span id="timerText">15:00</span>
                </div>
                <div class="badge" id="counter">1 / 31</div>
            </div>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>

        <div class="q-area">
            <div class="q-module" id="qModule">MODULE 1</div>
            <div class="q-text" id="qText">Loading questions...</div>
            <div class="q-topic" id="qTopic">Topic</div>
        </div>

        <div class="opts" id="opts"></div>
        <div class="fb" id="fb"></div>

        <div class="nav">
            <button class="btn btn-pri" id="nextBtn">Next →</button>
        </div>
    </div>

    <!-- RESULTS SCREEN -->
    <div class="screen" id="resultsScreen">
        <div class="rs">
            <h2>🏁 Quiz Complete!</h2>
            <p class="sub" id="resultMsg">Here's how you performed</p>
            <div class="score-ring">
                <div class="num" id="scorePct">0%</div>
                <div class="lbl">Score</div>
            </div>
            <div class="grid">
                <div class="card grn"><div class="n" id="rCorrect">0</div><div class="l">Correct</div></div>
                <div class="card red"><div class="n" id="rWrong">0</div><div class="l">Wrong</div></div>
                <div class="card amb"><div class="n" id="rSkipped">0</div><div class="l">Skipped</div></div>
                <div class="card pur"><div class="n" id="rTotal">31</div><div class="l">Total</div></div>
            </div>
            <div class="ra">
                <button class="btn btn-amber" id="restartBtn">🔄 Retry Quiz</button>
            </div>
        </div>
    </div>

</div>

<script>
(function(){
    const Q = [
        { id:1, mod:"Module 1 — Foundations", top:"Human Oversight",
          txt:"A developer built an AI agent to review legal contracts, but no human checked the output before sending it to the client. A clause was misclassified, causing losses. What went wrong?",
          opts:["The model was not good","The rules were incorrect","There was no Human Oversight","The architecture was poor"], ans:2 },

        { id:2, mod:"Module 1 — Foundations", top:"System of Record",
          txt:"The content team updates their core 'AI Prompting' module, which is delivered across 4 channels (Book, TutorClaw, Skillpack, Derivative Books). What is the benefit of a System of Record?",
          opts:["Each channel must be updated separately","All 4 channels update together (single source of truth)","Only 2 channels get updated","No benefit"], ans:1 },

        { id:3, mod:"Module 1 — Foundations", top:"5-Layer Model",
          txt:"A company's AI agent connects to the EHR system, sends alerts, and learns from patient flow. In Jensen Huang's 5-Layer Model, which layer is this?",
          opts:["Layer 1: Physical AI","Layer 3: AI Agents","Layer 2: Foundation Models","Layer 5: Enterprise Apps"], ans:1 },

        { id:4, mod:"Module 1 — Foundations", top:"Leverage Principle",
          txt:"A traditional company (500 people) and an AI-native company (12 people) produce the same output. Which principle does this demonstrate?",
          opts:["Economy of Scale","Leverage Principle","Diminishing Returns","Network Effect"], ans:1 },

        { id:5, mod:"Module 1 — Foundations", top:"Mode 1 vs Mode 2",
          txt:"A bank department head wants to use AI in her team's daily workflow, not build a new autonomous system. Which mode is this?",
          opts:["Mode 2 — Building AI Products","Mode 1 — Using AI to Accelerate Personal Work","Mode 3 — AI Strategy","Mode 0 — No AI"], ans:1 },

        { id:6, mod:"Module 2 — AI Prompting in 2026", top:"Deep Research Mode",
          txt:"You need a competitive analysis of a new AI product launched 2 weeks ago. Which mode works best?",
          opts:["Simple Chat mode","Deep Research mode","Roleplay mode","Summarize mode"], ans:1 },

        { id:7, mod:"Module 2 — AI Prompting in 2026", top:"Sycophancy",
          txt:"A PM shared an idea and Claude replied 'great idea!' What is this actually called?",
          opts:["Genuine appreciation","Sycophancy (AI's habit of agreeing)","Creative feedback","Technical analysis"], ans:1 },

        { id:8, mod:"Module 2 — AI Prompting in 2026", top:"Fresh Conversation",
          txt:"After a 3-hour session, the context has become mixed and messy. What should you do?",
          opts:["Continue in the same conversation","Tell the agent to ignore the history","Start a new conversation for a substantially different task","Nothing"], ans:2 },

        { id:9, mod:"Module 2 — AI Prompting in 2026", top:"Video Cost / Time",
          txt:"A UX designer wants to create 50 video mockup variations. What will happen?",
          opts:["All 50 variations can be made","Only 2-3 variations are feasible within budget/time","50 variations can be made for free","Video mockups are impossible"], ans:1 },

        { id:10, mod:"Module 2 — AI Prompting in 2026", top:"Long-Doc Analysis",
          txt:"You need to analyze a 300-page policy document. Which AI model is best suited?",
          opts:["ChatGPT","Midjourney","DALL-E","Claude (strong at long-document analysis and structured reasoning)"], ans:3 },

        { id:11, mod:"Module 3 — What AI Actually Is", top:"Hallucination",
          txt:"A journalist asked an AI for sources and got fake citations. Why did this happen?",
          opts:["The AI lied on purpose","AI predicts 'plausible' answers — incorrect ones come with the same confidence as correct ones","There was a system bug","The internet was down"], ans:1 },

        { id:12, mod:"Module 3 — What AI Actually Is", top:"Frozen Weights",
          txt:"A policy explained on Monday was not remembered by the AI on Tuesday. Why?",
          opts:["The AI is dishonest","The memory limit was exceeded","The model's weights are frozen — a rule mentioned in chat does not permanently change the model","The AI chose to ignore it"], ans:2 },

        { id:13, mod:"Module 3 — What AI Actually Is", top:"Jagged Frontier",
          txt:"An AI solved a complex task correctly but failed at counting letters. What is this phenomenon called?",
          opts:["AI stupidity","The Jagged Frontier","Overfitting","Mode collapse"], ans:1 },

        { id:14, mod:"Module 3 — What AI Actually Is", top:"Tool Integration",
          txt:"You want to turn a protein folding predictor into an 'agent.' What is needed?",
          opts:["More data","A better model","Tool integrations that let the AI trigger lab equipment and feed results back into the loop","A faster GPU"], ans:2 },

        { id:15, mod:"Module 3 — What AI Actually Is", top:"Prediction Patterns",
          txt:"A professor and a student asked the same AI and got different answers. Why?",
          opts:["The AI played favorites","AI predictions are shaped by conversation pattern and phrasing, not a verified fact record","The professor paid more","It was a random answer"], ans:1 },

        { id:16, mod:"Module 4 — Working Safely", top:"Admin Access & Backup",
          txt:"A business owner gave full admin access to an AI — files got deleted. What went wrong?",
          opts:["The AI made a mistake","Two mistakes: (1) Day-one full admin access (2) No external backup / version control","It was a virus","Nothing wrong"], ans:1 },

        { id:17, mod:"Module 4 — Working Safely", top:"Shadow Mode",
          txt:"A bank wants to test an AI loan agent in 'shadow mode' first. What is shadow mode?",
          opts:["The AI works blindly","Nobody can see the AI","Shadow Mode: AI runs in parallel, makes decisions, but those decisions are not acted upon — only for comparison","The AI only works at night"], ans:2 },

        { id:18, mod:"Module 4 — Working Safely", top:"Tool Selection",
          txt:"You need a real-time creative session with voice + image generation. Which tool is best in mid-2026?",
          opts:["Claude","Midjourney","ChatGPT (ahead in both voice interaction and image generation)","Google Search"], ans:2 },

        { id:19, mod:"Module 4 — Working Safely", top:"Test Before Batch",
          txt:"You need to rename 2000 files. What should you do before batch approving?",
          opts:["Approve all at once","Select randomly","First test on 5-10 files, verify the output, then approve the full batch","Have someone else do it"], ans:2 },

        { id:20, mod:"Module 4 — Working Safely", top:"Text vs Video Cost",
          txt:"For 10,000 products — video descriptions vs text descriptions. What will the product manager say?",
          opts:["Make videos — they are more attractive","The PM is wrong","Text is much cheaper and faster, video generation is costly and slow","Make both"], ans:2 },

        { id:21, mod:"Module 5 — Markdown In, HTML Out", top:"Bullets vs Numbered Lists",
          txt:"In the instructions for deleting data, bullet points were used. What does that mean?",
          opts:["Order matters","Bullet points = independent items, no sequence implied","Data should not be deleted","Bullet points are the same as numbered lists"], ans:1 },

        { id:22, mod:"Module 5 — Markdown In, HTML Out", top:"Out of Scope",
          txt:"Instead of an expense report, the AI built an entire finance platform. What was missing?",
          opts:["The AI was too smart","The model was not good","An 'Out of Scope' section that clearly states what to EXCLUDE","More data was needed"], ans:2 },

        { id:23, mod:"Module 5 — Markdown In, HTML Out", top:"Grade the Spec",
          txt:"A developer gave a spec to AI without refining it — the output was mismatched. What should have been done?",
          opts:["Nothing","The spec should have been graded first (aim for 9+/10)","A new model should have been used","No spec was needed"], ans:1 },

        { id:24, mod:"Module 5 — Markdown In, HTML Out", top:"Fenced Code Blocks",
          txt:"A JSON example contained 'delete_all_users' — the AI treated it as an instruction. How to prevent this?",
          opts:["Don't use JSON","Use triple backtick fenced code blocks (```) — this signals 'this is data/example, not an instruction'","Only use images","Scold the AI"], ans:1 },

        { id:25, mod:"Module 5 — Markdown In, HTML Out", top:"AI-to-AI Format",
          txt:"One AI agent is generating a report for another AI agent to consume. Which format is best?",
          opts:["HTML webpage","PDF","Structured Markdown (best for machine-to-machine parsing)","Excel sheet"], ans:2 },

        { id:26, mod:"Module 6 — Code You Never Write", top:"VPRF Framework",
          txt:"You need to scan 8000 blog posts and find 47 product names. What approach should you take?",
          opts:["Do it one-by-one in chat","VPRF signals (Volume, Repetition, Files) are present — this should be done with CODE (Python script)","Hire a contractor","Skip the task"], ans:1 },

        { id:27, mod:"Module 6 — Code You Never Write", top:"Verification Tells",
          txt:"An analyst says 'Approximately $847' and 'aligns with typical benchmarks.' No code was run. What should you say?",
          opts:["That's fine, approximate is enough","'Write and run the code, show me the exact calculation' — 'Approximately' is a verification tell","Trust the AI","Ask someone else"], ans:1 },

        { id:28, mod:"Module 6 — Code You Never Write", top:"Level 3 Verification",
          txt:"A leap year error was discovered only after a board presentation. What is Level 3 verification?",
          opts:["Rewrite the code","Ask the AI to explain its date-handling logic in plain English","Apologize to the board","Use a new model"], ans:1 },

        { id:29, mod:"Module 6 — Code You Never Write", top:"Saved Script Value",
          txt:"After 6 months, a colleague needs the same analysis. What is the value of a saved script?",
          opts:["No value","The saved brief + script eliminates rediscovery cost — one day of work becomes a permanent reusable asset","Only the original person can use it","A new script must be written"], ans:1 },

        { id:30, mod:"Module 6 — Code You Never Write", top:"Terminal Scheduling",
          txt:"You need an automatic cash flow report + email every month at 8 AM. Which tool is best?",
          opts:["ChatGPT browser","Google Docs","Terminal surface (Claude Code) — supports scheduling (cron), persistent scripts, and email integration","Mobile app"], ans:2 },

        { id:31, mod:"Module 7 — Skills & Connectors", top:"Skill vs Connector",
          txt:"A sales manager types the same 8-step instructions every Monday. Is this a Skill or a Connector?",
          opts:["Connector","Both","Skill — he keeps repeating HOW (method). A Connector only connects a DATA source","Neither"], ans:2 }
    ];

    const LETTERS = ['A','B','C','D'];
    const TOTAL = Q.length;
    let idx = 0;
    // For each question: null = not answered, 'correct' = correct, 'wrong' = wrong
    let results = new Array(TOTAL).fill(null);
    let done = false;
    let timerInterval = null;
    let timeLeft = 900;
    let timerActive = true;

    const quizScreen = document.getElementById('quizScreen');
    const resultsScreen = document.getElementById('resultsScreen');
    const counter = document.getElementById('counter');
    const progressFill = document.getElementById('progressFill');
    const qModule = document.getElementById('qModule');
    const qText = document.getElementById('qText');
    const qTopic = document.getElementById('qTopic');
    const opts = document.getElementById('opts');
    const fb = document.getElementById('fb');
    const nextBtn = document.getElementById('nextBtn');
    const timerText = document.getElementById('timerText');
    const timerDisplay = document.getElementById('timerDisplay');

    // ===== TIMER =====
    function formatTime(sec) {
        const m = Math.floor(sec / 60);
        const s = sec % 60;
        return (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
    }

    function updateTimer() {
        if (!timerActive) return;
        timerText.textContent = formatTime(timeLeft);
        if (timeLeft <= 60) timerDisplay.classList.add('warn');
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            timerActive = false;
            if (!done) autoSubmit();
        }
    }

    function startTimer() {
        updateTimer();
        timerInterval = setInterval(function(){ timeLeft--; updateTimer(); }, 1000);
    }

    function stopTimer() {
        clearInterval(timerInterval);
        timerActive = false;
    }

    // ===== RENDER =====
    function render(i) {
        const q = Q[i];
        qModule.textContent = q.mod;
        qText.textContent = 'Q' + q.id + '. ' + q.txt;
        qTopic.textContent = q.top;
        counter.textContent = (i+1) + ' / ' + TOTAL;
        progressFill.style.width = ((i+1)/TOTAL*100) + '%';

        // Build options
        let html = '';
        for (let j = 0; j < q.opts.length; j++) {
            html += '<div class="opt" data-i="'+j+'">';
            html += '<span class="opt-letter">'+LETTERS[j]+'</span>';
            html += q.opts[j];
            html += '</div>';
        }
        opts.innerHTML = html;

        // Hide feedback initially
        fb.classList.remove('show','ok','fail');

        // Check if this question was already answered
        if (results[i] !== null) {
            // Already answered — show the result state
            const allOpts = opts.querySelectorAll('.opt');
            allOpts.forEach(function(el, j) {
                el.classList.add('disabled-click');
                if (j === q.ans) {
                    el.classList.add('correct-ans');
                }
            });
            // Show feedback based on saved result
            fb.className = 'fb show ' + (results[i] === 'correct' ? 'ok' : 'fail');
            fb.innerHTML = results[i] === 'correct'
                ? '✅ <strong>Correct Answer!</strong>'
                : '❌ <strong>Wrong Answer!</strong>';
        } else {
            // Not answered — add click listeners
            opts.querySelectorAll('.opt').forEach(function(el) {
                el.addEventListener('click', function handler() {
                    const chosen = parseInt(this.dataset.i);
                    handleAnswer(i, chosen);
                });
            });
        }

        // Next button text
        if (i === TOTAL-1) {
            nextBtn.textContent = done ? '✅ Done' : '📊 Submit Quiz';
        } else {
            nextBtn.textContent = 'Next →';
        }
    }

    function handleAnswer(i, chosen) {
        const q = Q[i];
        const isCorrect = (chosen === q.ans);
        results[i] = isCorrect ? 'correct' : 'wrong';

        // Disable all option clicks
        const allOpts = opts.querySelectorAll('.opt');
        allOpts.forEach(function(el) {
            el.classList.add('disabled-click');
        });

        // Apply colors
        allOpts.forEach(function(el, j) {
            if (j === q.ans) {
                el.classList.add('correct-ans');
            } else if (j === chosen && !isCorrect) {
                el.classList.add('wrong-ans');
            }
        });

        // Show feedback
        fb.className = 'fb show ' + (isCorrect ? 'ok' : 'fail');
        fb.innerHTML = isCorrect
            ? '✅ <strong>Correct Answer!</strong>'
            : '❌ <strong>Wrong Answer!</strong>';
    }

    // ===== NEXT BUTTON =====
    nextBtn.addEventListener('click', function() {
        if (idx === TOTAL-1) {
            if (!done) submitQuiz();
            return;
        }

        // If current question was not answered, mark as wrong
        if (results[idx] === null) {
            results[idx] = 'wrong';
        }

        // Move to next question
        idx++;
        render(idx);
    });

    // ===== SUBMIT =====
    function submitQuiz() {
        stopTimer();

        // Mark any unanswered questions as wrong
        for (let i = 0; i < TOTAL; i++) {
            if (results[i] === null) results[i] = 'wrong';
        }

        done = true;
        let c = 0, w = 0;
        for (let i = 0; i < TOTAL; i++) {
            if (results[i] === 'correct') c++;
            else w++;
        }
        showResults(c, w);
    }

    function autoSubmit() {
        for (let i = 0; i < TOTAL; i++) {
            if (results[i] === null) results[i] = 'wrong';
        }
        done = true;
        let c = 0, w = 0;
        for (let i = 0; i < TOTAL; i++) {
            if (results[i] === 'correct') c++;
            else w++;
        }
        showResults(c, w);
    }

    function showResults(c, w) {
        const pct = Math.round(c/TOTAL*100);
        quizScreen.classList.remove('on');
        resultsScreen.classList.add('on');

        document.getElementById('scorePct').textContent = pct + '%';
        document.getElementById('rCorrect').textContent = c;
        document.getElementById('rWrong').textContent = w;
        document.getElementById('rSkipped').textContent = TOTAL - c - w;
        document.getElementById('rTotal').textContent = TOTAL;

        const msg = document.getElementById('resultMsg');
        if (pct >= 80) msg.textContent = '🎉 Outstanding! You really know AI Agent Factory concepts!';
        else if (pct >= 60) msg.textContent = '👍 Good job! A little revision and you\'ll ace it!';
        else if (pct >= 40) msg.textContent = '📖 Not bad, review the explanations and try again!';
        else msg.textContent = '💪 Keep practicing! Review the material and retry the quiz.';
    }

    document.getElementById('restartBtn').addEventListener('click', function() {
        stopTimer();
        results = new Array(TOTAL).fill(null);
        idx = 0; done = false;
        timeLeft = 900;
        timerActive = true;
        timerDisplay.classList.remove('warn');
        resultsScreen.classList.remove('on');
        quizScreen.classList.add('on');
        fb.classList.remove('show','ok','fail');
        render(0);
        startTimer();
    });

    // ===== INIT =====
    render(0);
    startTimer();
})();
</script>
</body>
</html>
